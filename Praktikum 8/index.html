<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorGen - 2572030</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            
        }
        
        .container{
            display: flex;
            align-items: center;
            flex-direction: column;
            border: 1px solid black;
            border-radius: 20px;
            padding: 20px;
            margin:auto;
            margin-top: 400px;
            width: 300px;
            justify-content: center;
            background-color: white;
        }
        
        #warna{
            width: 80px;
            height: 35px;
        }
        
        </style>
</head>
<body>
    <div class="container">
        <h1>Color Generator</h1>
        <button onclick="ubah()">Generate</button>
        <div id="warna"></div>
    </div>
        <script>
            function ubah() {
                var hex = "#";
                var karakter = "123456789ABCDEF";
                for(var i=0; i<6; i++){
                    var idx = Math.floor(Math.random()*16);
                    hex += karakter[idx]
                }
            document.getElementById("warna").innerHTML = hex;
            document.body.style.background = hex;
            }
        </script>

    
</body>
</html>
