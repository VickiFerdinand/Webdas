<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game - 2572030</title>
        <style> 
        body { 
            background: black; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            /* Supaya tidak ada scroll saat box muncul */ 
        } 
        
        #message { 
            text-align: center; 
            padding: 10px; 
            font-size: 1.5rem; 
            height: 60px; 
        } 
        
        .stats { 
            text-align: center; 
            color: #ffeb3b; 
            font-size: 1.2rem; 
        } 
 
        .output { 
            width: 100vw; 
            height: calc(100vh - 150px); 
            position: relative; 
        } 
 
        .box { 
            width: 100px; 
            height: 100px; 
            position: absolute; 
            display: none; 
            cursor: pointer; 
            border: 1px solid white; 
        } 

        #start{
            text-align: center;
            align-self: center;
            justify-content: center;
            border: 1px solid white;
            margin: 0 auto;
            width: 50px;
            height: 50px;
        }

        #reset{
            text-align: center;
            align-self: center;
            justify-content: center;
            border: 1px solid white;
            margin: 0 auto;
            width: 50px;
            height: 50px;
            margin-top: 60px;
            display: none;
        }

        #skoring{
            text-align: center;
        }

        #ulangs{
            text-align: center;
            display: none;
        }
    </style>

    </head>
    <body>
        <div id="message">Press the box to start!</div>
        <p id="skoring"></p>
        <div class="stats">Time: <span id="timer">30</span>s</div>
        <div id="start" onclick="ulang()">
            <p>Start</p>
        </div>
        <div id="ulangs">Mau ulang?</div>
        <div id="reset"><p>Reset</p></div>
        <div class="output"></div>
        
        
        <script>


		const output = document.querySelector(".output");
		const box = document.createElement("div");
		const timeDisplay = document.getElementById('timer');  
            
        var skor = 0
        let gameTimer, timeLeft=3;
        document.querySelector("#start").addEventListener("click",()=>{
            gameTimer = setInterval(() => {
                timeDisplay.innerText = timeLeft;
                timeLeft--;
                if (timeLeft < 0){endGame()};
            }, 1000);
        });

        function endGame() {
            clearInterval(gameTimer);
            start.style.display="block";
            start.innerHTML="Reset";
            teks = document.getElementById("ulangs")
            teks.style.display="block"
            teks.style.margin="0"
            box.style.display="none"
            start.style.display="block"
            alert("Waktu habis!");
        
        }

        function ulang() {
            var waktu = document.getElementById("timer")
            var kata = document.getElementById("skoring")
            kata.innerHTML=`skor : ${skor}`
			var berak = document.getElementById("message")
            var hose = document.getElementById("start")
            berak.innerHTML="Click as fast you can"
            start.style.display="none"
			box.classList.add("box");
			output.append(box);
            
			// Langsung tampilkan box pertama untuk trigger start
			box.style.display = "block";
			box.style.top = "50px";
			box.style.left = "45%";
			box.style.textAlign = "center";
			box.style.lineHeight = "100px";
			
			addBox()

            if (timeLeft >= 0){
                setTimeout("ulang()", 1000);
                
            }else{
                hose.style.display = 'none'
            }
			
		}

        function randomNumbers(max) {
            return Math.floor(Math.random() * max);
        }

        box.addEventListener("click",() => {
            skor++
        })
        function addBox() {
            
            const dimX = randomNumbers(50) + 10;
			const dimY = randomNumbers(50) + 10;

            box.style.display = "block";
            box.style.width = `${dimX}px`;
            box.style.height = `${dimY}px`;
            box.style.backgroundColor = "#" + Math.random().toString(16).substr(-6);

            // Pastikan posisi tetap di dalam kontainer output
            box.style.left = randomNumbers(900) + "px";
            box.style.top = randomNumbers(600) + "px";
            box.style.borderRadius = randomNumbers(50) + "%";
        }
    </script>
    </body>

</html>
