<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan</title>
    <style>
        *{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
        }
        body{
            display: grid;
            grid-template-areas: 
                    "sidebar header"
                    "sidebar main";
            grid-template-columns: 200px 1fr;
            grid-template-rows: 50px 1fr;
        }
        .sidebar{
            background-color: rgb(52, 58, 64);
            color: white;
            grid-area: sidebar;
            height: 100vh;
            padding: 10px;
        }
        .sidebar h2{
            text-align: center;
            padding: 10px;
        }
        .sidebar a {
            text-decoration: none;
            color: white;
            padding: 5px;

        }
        .menu{
            display: flex;
            flex-direction: column;
            padding: 10px;
            margin: 0 10px;
            
        }
        .menu a{
            text-decoration: none;
            color: white;
            padding: 10px;
        }
        .menu a:hover{
            background-color: rgb(74, 76, 78);
        }
        .header{
            background-color: rgb(0, 122, 255);
            color: white;
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px ;
        }
        .user-info{
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        h2{
            font-size: 20px;
        }
        .user-info img{
            width: 30px;
            height: 30px;
            border-radius: 10px;
            padding: 5px;
        }
        .main-content{
            grid-area: main;
            padding: 10px;
        }
        .card-container{
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card{
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 10px;
        }
        .card p{
            color: rgb(0, 122, 255);
            font-weight: bold;
        }
        .btn-lgt{
            background-color: rgb(220, 53, 69);
            color: white;
            width: 100%;
            margin-top: 250%;
            padding: 10px;
            cursor: pointer;
        }
        .btn-lgt:hover{
            background-color: rgb(216,37,55);
        }

        @media only screen and (max-width:500px){
            body{
                grid-template-columns: 1fr;
                grid-template-areas: 
                "header"
                "main";
            }
            .sidebar{
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="menu">
            <h2>Information System</h2>
            <a href ="#">Dashboard</a>
            <a href ="#">Laporan</a>
            <a href ="#">Pengguna</a>
            <a href ="#">Pengaturan</a>
        </div>
        <button class="btn-lgt">Logout</button>
    </div>
    <div class="header">
        <h2>Dashboard</h2>
        <div class="user-info">
            <span>Admin</span>
            <img src="Capa Cipi Logo.png" alt="user">
        </div>
    </div>
    <div class="main-content">
        <h2>Ringkasan</h2>
        <div class="card-container">
            <div class="card">
                <h3>Total pengguna</h3>
                <p>1,257</p>
            </div>
            <div class="card">
                <h3>Penjualan Bulan ini</h3>
                <p>Rp 150,151,152</p>
            </div>
            <div class="card">
                <h3>Ticket Support</h3>
                <p>24</p>
            </div>
            <div class="card">
                <h3>Feedback</h3>
                <p>320</p>
            </div>
        </div>
    </div>
</body>
</html>
